name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Android Release APK ─────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APKs (split by architecture)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: Android-APKs
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30


  # ── iOS IPA (unsigned — install via TrollStore or Sideloadly) ───────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        
      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Find Runner.app and package as IPA
        run: |
          # Find Runner.app wherever Flutter put it
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found Runner.app at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found! Listing build/ios:"
            find build/ios -type d | head -30
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/Runner.app
          zip -r -y TheAbyss.ipa Payload
          echo "IPA created successfully"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: TheAbyss.ipa
          retention-days: 30
