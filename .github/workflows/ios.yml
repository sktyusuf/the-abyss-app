name: iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: cd ios && pod install

      - name: Build iOS (no signing)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          APP=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr TheAbyss.ipa Payload
          echo "Done: $(du -sh TheAbyss.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: TheAbyss.ipa
          retention-days: 30
