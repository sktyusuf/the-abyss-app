name: iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios:
    name: iOS IPA
    runs-on: macos-14  # macOS Sonoma — has Xcode 15.4 pre-installed

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4 (Xcode 16 has asset catalog bug with Flutter)
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Find Runner.app and package as IPA
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found Runner.app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found! Listing build/ios:"
            find build/ios -type d | head -30
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/Runner.app
          zip -r -y TheAbyss.ipa Payload
          echo "IPA created successfully"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: TheAbyss.ipa
          retention-days: 30
